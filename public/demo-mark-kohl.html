<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Kohl - AI Mentor Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
      color: white;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
    }
    .embed-container {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    iframe {
      width: 100%;
      height: 700px;
      border: none;
      border-radius: 12px;
    }
    footer {
      margin-top: 30px;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mark Kohl</h1>
    <p class="subtitle">AI Mentor - Psychedelics, Spirituality & Transformation</p>
  </header>
  
  <div class="embed-container">
    <iframe 
      src="/embed/mentors/mark-kohl"
      allow="microphone; camera"
      title="Mark Kohl AI Mentor">
    </iframe>
  </div>
  
  <footer>
    Powered by ELXR AI
  </footer>
</body>
</html>
